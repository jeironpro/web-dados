<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Lanza dados virtuales con seleccion multiple de 1 a 12 dados. Interfaz interactiva con respuesta tactil para movil."
        />
        <title>Dados interactivos</title>
        <link rel="canonical" href="https://web-dados.vercel.app/" />
        <link rel="icon" href="favicon.svg" type="image/svg+xml" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="css/style.css" />
        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "WebApplication",
                "name": "Dados virtuales interactivos",
                "description": "Aplicacion interactiva para lanzar dados virtuales con seleccion multiple y respuesta tactil",
                "applicationCategory": "GameApplication",
                "operatingSystem": "All",
                "browserRequirements": "Requiere JavaScript"
            }
        </script>
    </head>
    <body>
        <a href="#dice-grid" class="skip-link">Saltar al contenido principal</a>

        <main id="app">
            <h1 class="visually-hidden">Dados virtuales interactivos</h1>

            <header class="controls">
                <span class="controls__label">Cantidad de dados</span>
                <input
                    type="range"
                    id="dice-count-slider"
                    class="controls__slider"
                    min="1"
                    max="12"
                    value="1"
                    step="1"
                    aria-label="Seleccionar cantidad de dados"
                />
                <span class="controls__count" id="dice-count">1</span>
            </header>

            <section class="dice-grid" id="dice-grid" aria-label="Dados">
                <!-- Los dados se renderizan dinamicamente mediante JavaScript -->
            </section>

            <div
                id="roll-announce"
                class="visually-hidden"
                aria-live="polite"
                role="status"
            ></div>
        </main>

        <script type="module" src="js/app.js"></script>
    </body>
</html>
